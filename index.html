<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة المحمول الاحترافية V2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #25D366; --danger: #e74c3c; --blue: #3498db; --bg: #f4f7f6; --dark: #2c3e50; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 60px; }
        
        .footer-rights { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--dark); color: white; text-align: center; padding: 8px 0; font-size: 11px; z-index: 1000; box-shadow: 0 -2px 5px rgba(0,0,0,0.2); }
        .container { max-width: 600px; margin: auto; }
        
        /* الهيدر ثابت في كل الصفحات */
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; border-bottom: 4px solid var(--primary); position: sticky; top: 0; z-index: 1001; }
        .logo-txt { font-size: 18px; font-weight: bold; color: var(--dark); cursor: pointer; }
        
        /* أيقونة الراجل - ثابتة ومتاحة دائماً */
        .sync-box { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 45px; }
        #runner { 
            width: 30px; height: 30px; 
            background-size: contain; background-repeat: no-repeat; background-position: center; 
            background-image: url('https://cdn-icons-png.flaticon.com/512/5556/5556499.png'); 
        }
        .running { background-image: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3/3o7TKMGpxx35HJ2X1u/giphy.gif') !important; }
        .success-pose { background-image: url('https://cdn-icons-png.flaticon.com/512/1533/1533913.png') !important; }
        #syncPercentDisplay { font-size: 10px; font-weight: bold; color: var(--primary); }

        .notif-badge { position: relative; }
        .badge-count { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; display: none; }

        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 10px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card span { display: block; font-size: 11px; color: #777; }
        .stat-card b { font-size: 18px; color: var(--dark); }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        button { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; transition: 0.3s; }
        .btn-save { background: var(--dark); color: white; }
        .btn-image { background: var(--blue); color: white; }
        .btn-whatsapp { background: var(--primary); color: white; }
        .btn-del-item { background: none; color: var(--danger); font-size: 14px; width: auto; padding: 5px; margin: 0; }
        .btn-sync { background: #6c5ce7; color: white; }
        .search-box { background: white; padding: 5px 15px; border-radius: 25px; margin-bottom: 15px; border: 1px solid #ddd; }
        .customer-row { background: white; padding: 12px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-right: 5px solid var(--blue); transition: 0.2s; }
        .cust-info { flex-grow: 1; cursor: pointer; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .history-table th, .history-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        #receiptArea { background: white; padding: 50px; width: 1000px; margin: 20px auto; border: 20px solid var(--dark); display: none; position: absolute; left: -9999px; }
        .r-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #eee; padding-bottom: 30px; margin-bottom: 30px; }
        .r-logo-img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 5px solid var(--dark); }
        .r-info { text-align: right; flex-grow: 1; margin-right: 30px; }
        .r-info h2 { font-size: 55px; margin: 0; color: var(--dark); }
        .r-info p { font-size: 28px; margin: 8px 0; color: #555; }
        .r-table { width: 100%; border-collapse: collapse; }
        .r-table th { background: #f8f9fa; font-size: 26px; padding: 18px; border: 2px solid #ddd; }
        .r-table td { font-size: 24px; padding: 18px; border: 2px solid #ddd; text-align: center; }
        .r-total-box { background: var(--dark); color: white; padding: 30px; margin-top: 40px; text-align:center; border-radius: 20px; font-size: 50px; font-weight: bold; }
        .r-footer { text-align: center; margin-top: 40px; font-size: 28px; border-top: 3px dashed #ccc; padding-top: 30px; }
        .cloud-sync-card { border: 2px solid #4285F4 !important; background: #f8fbff !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-txt" id="displayShopName" onclick="showMain()">تحميل...</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <div class="sync-box">
                <div id="runner"></div>
                <span id="syncPercentDisplay">0%</span>
            </div>

            <div class="notif-badge" onclick="toggleNotifications()">
                <span id="notifBadge" class="badge-count">0</span>
                <button style="background:none; border:none; font-size:20px; padding:0; width:auto; cursor:pointer;">🔔</button>
            </div>
            <button onclick="toggleTrash()" style="background:none; border:none; font-size:20px; width:auto; padding:0; cursor:pointer;">🗑️</button>
            <button class="btn-settings" onclick="toggleSettings()" style="background:none; border:none; font-size:24px; width:auto; padding:0; cursor:pointer;">⚙️</button>
        </div>
    </div>

    <div id="mainView">
        <div class="stats-bar">
            <div class="stat-card" style="border-bottom: 3px solid green;"><span>إجمالي لنا</span><b id="totalLana" style="color: green;">0</b></div>
            <div class="stat-card" style="border-bottom: 3px solid red;"><span>إجمالي علينا</span><b id="totalAlina" style="color: red;">0</b></div>
        </div>
        <div class="card">
            <h3 style="margin:0 0 10px 0; font-size: 16px;">➕ إضافة عميل</h3>
            <div style="display: flex; gap: 5px;"><input type="text" id="newCustName" placeholder="الاسم"><input type="tel" id="newCustPhone" placeholder="رقم الموبايل"></div>
            <button class="btn-whatsapp" onclick="addCustomer()">إضافة للقائمة +</button>
        </div>
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث بالاسم أو الرقم..." oninput="renderCustomers()">
        <div id="customersDisplay"></div>
    </div>

    <div id="notificationsView" style="display:none">
        <div class="card">
            <h3>🔔 عملاء متأخرين (>24 ساعة)</h3>
            <div id="notifList"></div>
            <button onclick="showMain()" style="background:var(--dark); color:white; margin-top:10px;">عودة للرئيسية</button>
        </div>
    </div>

    <div id="trashView" style="display:none">
        <div class="card">
            <h3>🗑️ المحذوفات (آخر 24 ساعة)</h3>
            <div id="trashList"></div>
            <button onclick="showMain()" style="background:var(--dark); color:white; margin-top:10px;">عودة للرئيسية</button>
        </div>
    </div>

    <div id="settingsView" style="display:none">
        <div class="card">
            <h3>⚙️ الإعدادات</h3>
            <label>اسم المحل:</label><input type="text" id="setShopName">
            <label>أرقام التواصل:</label><input type="text" id="setShopPhones">
            <label>شعار المحل (Logo):</label><input type="file" id="setShopLogo" accept="image/*" onchange="previewImage(this)">
            <img id="logoPreview" style="width:80px; height:80px; border-radius:50%; display:none; margin:10px auto;">
            <button class="btn-save" onclick="saveSettings()">💾 حفظ الإعدادات</button>
            <button onclick="showMain()" style="background:var(--dark); color:white; margin-top:10px;">عودة للرئيسية</button>
        </div>
        <div class="card cloud-sync-card">
            <h3>☁️ سحابة Google Sheets</h3>
            <label>كود المزامنة الخاص بك:</label><input type="text" id="syncKeyInput" placeholder="اكتب كود المزامنة هنا">
            <button onclick="cloudAction('upload')" style="background:#4285F4; color:white;">📤 رفع يدوي الآن</button>
            <button onclick="cloudAction('download')" style="background:#34A853; color:white;">📥 استرجاع من الجوجل</button>
            <p id="syncStatus" style="font-size: 11px; text-align: center; margin-top: 5px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="customerProfile" style="display:none">
        <div class="card">
            <h2 id="currentCustName" style="margin:0; color: var(--blue);"></h2>
            <div id="currentBalance" style="font-size: 22px; font-weight: bold; margin: 10px 0;"></div>
            <hr>
            <div style="display: flex; gap: 5px;">
                <select id="transType" style="flex: 1;"><option value="add">عليه</option><option value="sub">سدد</option></select>
                <input type="number" id="transAmount" placeholder="المبلغ" style="flex: 1;">
            </div>
            <input type="text" id="transNote" placeholder="بيان العملية">
            <button class="btn-save" onclick="processEntry(false)">✅ حفظ فقط</button>
            <button class="btn-whatsapp" onclick="processEntry(true)">💬 حفظ وإرسال واتساب</button>
            <button onclick="showMain()" style="background:var(--dark); color:white; margin-top:10px;">عودة للقائمة</button>
        </div>
        <div class="card"><h4 style="margin:0 0 10px 0;">السجل الأخير:</h4><table class="history-table"><tbody id="fullHistoryBody"></tbody></table></div>
    </div>
</div>

<div class="footer-rights">
    من تصميم أبو أحمد مصطفى حمدي توفيق - جميع الحقوق محفوظة
</div>

<script>
    let customers = JSON.parse(localStorage.getItem('abu_ahmed_data')) || [];
    let trash = JSON.parse(localStorage.getItem('abu_ahmed_trash')) || [];
    let settings = JSON.parse(localStorage.getItem('abu_ahmed_settings')) || { shopName: "منظومة أبو أحمد", phones: "010xxxx", logo: "" };
    let activeIdx = null;
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsmS1Ayeeo0l7LSYNu6bJEIckQ-Zn4rXfHVWCfGIlm5U2W5cU3eD1l3eHI6zbtpA/exec";

    function init() {
        document.getElementById('displayShopName').innerText = settings.shopName;
        document.getElementById('setShopName').value = settings.shopName;
        document.getElementById('setShopPhones').value = settings.phones;
        calculateGlobalStats(); renderCustomers(); checkDelayedCustomers();
        if(document.getElementById('syncKeyInput').value.trim()) cloudAction('upload');
    }

    async function cloudAction(type) {
        const key = document.getElementById('syncKeyInput').value.trim();
        if(!key) return; 
        const runner = document.getElementById('runner');
        const percentTxt = document.getElementById('syncPercentDisplay');
        
        if(type === 'upload') {
            runner.classList.add('running');
            let progress = 0;
            let interval = setInterval(() => {
                progress += 10;
                if(progress >= 90) { clearInterval(interval); percentTxt.innerText = "90%"; }
                else { percentTxt.innerText = progress + "%"; }
            }, 100);

            const payload = { action: "upload", key: key, data: JSON.stringify({ customers, settings }) };
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).then(() => {
                clearInterval(interval);
                percentTxt.innerText = "100%";
                runner.classList.remove('running');
                runner.classList.add('success-pose');
                setTimeout(() => { runner.classList.remove('success-pose'); percentTxt.innerText = "0%"; }, 3000);
            });
        } else {
            fetch(`${GOOGLE_SCRIPT_URL}?key=${key}`).then(res => res.json()).then(result => {
                if(result) { customers = result.customers; settings = result.settings; saveLocal(); location.reload(); }
            });
        }
    }

    function saveLocal() { localStorage.setItem('abu_ahmed_data', JSON.stringify(customers)); localStorage.setItem('abu_ahmed_settings', JSON.stringify(settings)); }
    function save() { saveLocal(); if(document.getElementById('syncKeyInput').value.trim()) cloudAction('upload'); }

    function showMain() { 
        const views = ['mainView', 'customerProfile', 'settingsView', 'trashView', 'notificationsView'];
        views.forEach(v => document.getElementById(v).style.display = (v === 'mainView' ? 'block' : 'none'));
        renderCustomers(); 
    }
    function toggleSettings() { showMain(); document.getElementById('mainView').style.display='none'; document.getElementById('settingsView').style.display='block'; }
    function toggleTrash() { showMain(); document.getElementById('mainView').style.display='none'; document.getElementById('trashView').style.display='block'; renderTrash(); }
    function toggleNotifications() { showMain(); document.getElementById('mainView').style.display='none'; document.getElementById('notificationsView').style.display='block'; renderDelayedList(); }

    function renderCustomers() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = customers.filter(c => c.name.toLowerCase().includes(term) || c.phone.includes(term));
        document.getElementById('customersDisplay').innerHTML = filtered.map((c, i) => {
            const idx = customers.indexOf(c);
            let bal = c.history.reduce((t, h) => h.type=='add' ? t+h.amount : t-h.amount, 0);
            return `<div class="customer-row"><div class="cust-info" onclick="openProfile(${idx})"><strong>${c.name}</strong><br><small style="color:${bal > 0 ? 'red' : 'green'}">${bal > 0 ? 'عليه: ' + bal : 'له: ' + Math.abs(bal)} ج.م</small></div><button style="width:40px; color:red; background:none; font-size:18px;" onclick="deleteCustomer(${idx})">🗑️</button></div>`;
        }).join('');
    }

    function addCustomer() {
        const name = document.getElementById('newCustName').value.trim();
        const phone = document.getElementById('newCustPhone').value.trim();
        if(!name) return;
        customers.push({ name, phone, history: [] });
        save(); init();
        document.getElementById('newCustName').value = ''; document.getElementById('newCustPhone').value = '';
    }

    function openProfile(i) {
        activeIdx = i; showMain();
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('customerProfile').style.display = 'block';
        document.getElementById('currentCustName').innerText = customers[i].name;
        updateUI();
    }

    function updateUI() {
        const total = customers[activeIdx].history.reduce((t, h) => h.type=='add' ? t+h.amount : t-h.amount, 0);
        document.getElementById('currentBalance').innerHTML = `الحساب: <span style="color:${total>=0?'red':'green'}">${total} ج.م</span>`;
        const history = [...customers[activeIdx].history].reverse();
        document.getElementById('fullHistoryBody').innerHTML = history.map((h, i) => `<tr><td>${h.date}</td><td>${h.amount}</td><td>${h.note}</td><td><button class="btn-del-item" onclick="deleteItem(${i})">❌</button></td></tr>`).join('');
    }

    function processEntry(shouldSend) {
        const amount = parseFloat(document.getElementById('transAmount').value);
        if(!amount) return;
        const type = document.getElementById('transType').value;
        const note = document.getElementById('transNote').value || "عملية رصيد";
        const now = new Date();
        const dateStr = `${now.toLocaleDateString('ar-EG')} (${now.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})})`;
        customers[activeIdx].history.push({ id: Date.now(), amount, type, note, date: dateStr });
        save(); updateUI(); calculateGlobalStats();
        if(shouldSend) {
            const total = customers[activeIdx].history.reduce((t, h) => h.type=='add' ? t+h.amount : t-h.amount, 0);
            window.open(`https://wa.me/2${customers[activeIdx].phone}?text=*${settings.shopName}*%0A*العميل:* ${customers[activeIdx].name}%0A*المبلغ:* ${amount}%0A*الإجمالي:* ${total}`);
        }
    }

    function deleteCustomer(i) { if(confirm("حذف؟")) { let c = customers.splice(i, 1)[0]; c.deletedAt = Date.now(); trash.push(c); save(); init(); } }
    function renderTrash() { document.getElementById('trashList').innerHTML = trash.map((item, i) => `<div class="customer-row"><span>${item.name}</span><button onclick="restoreCustomer(${i})" style="width:auto; padding:5px; background:var(--primary); color:white;">استعادة</button></div>`).join('') || "السلة فارغة"; }
    function restoreCustomer(i) { let r = trash.splice(i, 1)[0]; delete r.deletedAt; customers.push(r); save(); showMain(); }
    function calculateGlobalStats() { let l=0, a=0; customers.forEach(c => { let b = c.history.reduce((t,h)=>h.type=='add'?t+h.amount:t-h.amount, 0); if(b>0) l+=b; else a+=Math.abs(b); }); document.getElementById('totalLana').innerText = l + " ج.م"; document.getElementById('totalAlina').innerText = a + " ج.م"; }
    function checkDelayedCustomers() { let d = customers.filter(c => { if(c.history.length==0) return false; return (Date.now() - c.history[c.history.length-1].id) > 86400000; }); const b = document.getElementById('notifBadge'); if(d.length>0) { b.innerText = d.length; b.style.display='block'; } else b.style.display='none'; }
    function renderDelayedList() { /* مشابه لـ renderTrash ولكن للعملاء المتأخرين */ }
    function saveSettings() { settings.shopName = document.getElementById('setShopName').value; settings.phones = document.getElementById('setShopPhones').value; saveLocal(); init(); showMain(); }
    function previewImage(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => { settings.logo = e.target.result; document.getElementById('logoPreview').src = e.target.result; document.getElementById('logoPreview').style.display='block'; }; reader.readAsDataURL(input.files[0]); } }

    init();
</script>
</body>
</html>
